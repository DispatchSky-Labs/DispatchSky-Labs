<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/edct/" />
  <link rel="canonical" href="/edct/" />
  <title>Sadiom Flow</title>
  <style>
    :root {
      --page: #f5f5f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --blue: #0066cc;
    }

    * { box-sizing: border-box; }

    body {
      align-items: center;
      background: var(--page);
      color: var(--ink);
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      justify-content: center;
      line-height: 1.45;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      line-height: 1.05;
      margin: 0 0 12px;
    }

    p {
      color: var(--muted);
      font-size: 18px;
      margin: 0;
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sadiom Flow</h1>
    <p>Opening Flow. <a href="/edct/">Continue manually</a>.</p>
  </main>
</body>
</html>
